version: "2"
sql:
  - engine: "mysql"
    queries: "./internal/adapters/persistence/tidb/queries.sql"
    schema: "./migrations/tidb"
    gen:
      go:
        package: "db"
        out: "./internal/adapters/persistence/tidb/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false