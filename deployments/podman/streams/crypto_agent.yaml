input:
  kafka:
    addresses: [ "redpanda:29092" ]
    topics: [ "market-data" ]
    consumer_group: "wasm-group-crypto"

pipeline:
  processors:
    - wasm:
        module_path: "/connect/crypto_analyzer.wasm"
        function: "process"

output:
  kafka:
    addresses: [ "redpanda:29092" ]
    topic: "market-analysis"
