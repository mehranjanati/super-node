version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/adapters/persistence/postgres/queries.sql"
    schema: "./migrations"
    gen:
      go:
        package: "db"
        out: "./internal/adapters/persistence/postgres/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false