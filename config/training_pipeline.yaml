input:
  label: raw_events_ingestion
  kafka:
    addresses: ["redpanda:29092"]
    topics: ["raw_events", "agent_reasoning_logs", "user_feedback"]
    consumer_group: "training_data_curator"

pipeline:
  processors:
    # 1. Enrich with Metadata (Timestamp, Source)
    - label: enrich_metadata
      bloblang: |
        root = this
        root.meta.ingested_at = now()
        root.meta.source_topic = metadata("kafka_topic")

    # 2. Apply WASM-based Reward Function & Filtering
    # This runs our Rust code compiled to Wasm
    - label: wasm_reward_function
      wasm:
        module_path: "/wasm/mlops_reward.wasm"
        function: "process_event"
        
    # 3. Drop if Wasm returned null (filtered out)
    - label: filter_null_results
      bloblang: |
        root = if this == null { deleted() } else { this }

output:
  label: to_training_storage
  broker:
    pattern: fan_out
    outputs:
      # Sink 1: High-Quality Training Topic (The "Gold" Dataset)
      - kafka:
          addresses: ["redpanda:29092"]
          topic: "training_datasets_high_quality"
      
      # Sink 2: Long-term Storage (JSONL file for bulk training)
      - file:
          path: "/data/training/dataset_high_quality_${!timestamp_unix()}.jsonl"
          codec: lines
